<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>WEAR-RAG — Demo</title>
    <link rel="stylesheet" href="/static/style.css">
  </head>
  <body>
    <div class="container">
      <h1>WEAR-RAG — Interactive Demo</h1>
      <form id="demo-form">
        <label for="question">Question</label>
        <input id="question" name="question" placeholder="e.g. Why are transformers better than RNNs?" required />
        <button type="submit">Ask</button>
      </form>

      <div id="results">
        <h2>Answer</h2>
        <div id="answer">(no answer yet)</div>

        <h3>Evidence</h3>
        <ul id="evidence-list"></ul>
      </div>
    </div>

    <script src="/static/app.js"></script>
  </body>
</html>
